<html>

<body>
    <script>
        // Generate ShadowTrace icons as PNG files
        const sizes = [16, 48, 128];

        function drawIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const s = size;
            const cx = s / 2;
            const cy = s / 2;

            // Background
            ctx.fillStyle = '#0A0E17';
            ctx.beginPath();
            ctx.roundRect(0, 0, s, s, s * 0.15);
            ctx.fill();

            // Shield outline
            ctx.strokeStyle = '#22D3EE';
            ctx.lineWidth = Math.max(1.5, s * 0.03);
            ctx.shadowColor = '#22D3EE';
            ctx.shadowBlur = s * 0.08;

            ctx.beginPath();
            ctx.moveTo(cx, s * 0.1);
            ctx.lineTo(s * 0.82, s * 0.25);
            ctx.lineTo(s * 0.82, s * 0.55);
            ctx.quadraticCurveTo(s * 0.82, s * 0.8, cx, s * 0.92);
            ctx.quadraticCurveTo(s * 0.18, s * 0.8, s * 0.18, s * 0.55);
            ctx.lineTo(s * 0.18, s * 0.25);
            ctx.closePath();
            ctx.stroke();

            // Inner eye
            ctx.shadowBlur = s * 0.1;
            ctx.fillStyle = '#22D3EE';
            ctx.beginPath();
            ctx.arc(cx, cy + s * 0.05, s * 0.12, 0, Math.PI * 2);
            ctx.fill();

            // Pupil
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#0A0E17';
            ctx.beginPath();
            ctx.arc(cx, cy + s * 0.05, s * 0.05, 0, Math.PI * 2);
            ctx.fill();

            return canvas.toDataURL('image/png');
        }

        sizes.forEach(size => {
            const dataUrl = drawIcon(size);
            const link = document.createElement('a');
            link.download = `icon${size}.png`;
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>

</html>
