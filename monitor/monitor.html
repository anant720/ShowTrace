<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowTrace — Live Traffic Monitor</title>
    <link rel="stylesheet" href="monitor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="m-container">
        <header class="m-header">
            <div class="m-logo">
                <img src="../icons/icon.png" width="32" height="32" alt="Logo">
                <div class="m-title-group">
                    <h1>Network Forensics</h1>
                    <p>Real-time neural analysis of active tab traffic</p>
                </div>
            </div>
            <div class="m-controls">
                <div class="m-status-card">
                    <span class="m-status-dot online"></span>
                    <span id="tabInfo">Active Tab: Loading...</span>
                </div>
                <button id="clearBtn" class="m-btn-secondary">Clear Logs</button>
            </div>
        </header>

        <main class="m-main">
            <div class="m-table-container">
                <table id="requestTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Method</th>
                            <th>Type</th>
                            <th>URL / Endpoint</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="requestBody">
                        <!-- Rows injected by monitor.js -->
                        <tr>
                            <td colspan="5" class="m-loading">Waiting for traffic...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="inspector" class="m-inspector">
                <div class="m-inspector-header">
                    <h2>Forensic Inspector</h2>
                    <button id="closeInspector" class="m-close-btn">&times;</button>
                </div>
                <div id="inspectorContent" class="m-inspector-content">
                    <p style="padding: 20px; opacity: 0.5;">Select a request to inspect deep packet details...</p>
                </div>
            </div>
        </main>

        <footer class="m-footer">
            <div class="m-stats">
                <span>Captured: <b id="statCount">0</b></span>
                <span>POST Ratio: <b id="statPost">0%</b></span>
            </div>
            <div class="m-brand">ShadowTrace Intelligence v4.0.2</div>
        </footer>
    </div>
    <script src="monitor.js"></script>
</body>

</html>
